name: CI/CD Tienda Perritos - Backend - Despacho

on:
  push:
    branches: [ "main" ]
    paths:
      - "back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/**"

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR (runner)
      uses: aws-actions/amazon-ecr-login@v1
      with:
        mask-password: true

    - name: Build imagen Backend y push a ECR
      run: |
        cd back-Despachos_SpringBoot\Springboot-API-REST-DESPACHO
        docker build -t Dockerfile .
        docker tag Dockerfile:latest ${{ secrets.ECR_REPO_URL_BACKEND_D }}:latest
        docker push ${{ secrets.ECR_REPO_URL_BACKEND_D }}:latest

    - name: Desplegar Backend vía SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_D_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Actualizar tienda-backend-d desde ECR" \
          --parameters '{"commands":[
            "set -e",
            "aws ecr get-login-password --region '${{ secrets.AWS_REGION }}' | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
            "docker pull ${{ secrets.ECR_REPO_URL_BACKEND_D }}:latest",
            "docker stop tienda-backend-d || true",
            "docker rm tienda-backend-d || true",
            "docker run -d --name tienda-backend-d -p 3001:3001 ${{ secrets.ECR_REPO_URL_BACKEND_D }}:latest"
          ]}' \
          --output text